<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EMLTA · 3D logo</title>
    <style>
      :root { color-scheme: light; }
      html, body { margin: 0; height: 100%; background: #ffffff; }
      body { display: grid; place-items: center; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
      #stage { position: relative; width: 100%; height: 100%; }
      #stage canvas { display: block; }
      /* demo chrome hidden for site integration */
      .btns, #cap { display: none !important; }
      #err { position: absolute; inset: 0; display: none; place-items: center; text-align: center;
        padding: 24px; font: 500 14px system-ui, sans-serif; color: #5b675c; }
    </style>
  </head>
  <body>
    <div id="stage">
      <div class="btns">
        <button id="b-gloss" class="on">glossy-green</button>
        <button id="b-metal">metallic</button>
      </div>
      <div id="cap">EMLTA · hover the blocks · reload to replay the build</div>
      <div id="err">WebGL is unavailable in this browser.</div>
    </div>
    <script type="module">
      const stage = document.getElementById('stage');
      const errEl = document.getElementById('err');
      const showErr = (e) => { errEl.style.display = 'grid'; if (e) console.error(e); };
      let THREE, RoundedBoxGeometry;
      try {
        THREE = await import('https://esm.sh/three@0.169.0');
        ({ RoundedBoxGeometry } = await import('https://esm.sh/three@0.169.0/examples/jsm/geometries/RoundedBoxGeometry.js'));
      } catch (e) { showErr(e); }
      if (THREE) try {
        const GRID = 8, PITCH = 1, CS = 0.92, H_TALL = 1.15, H_SHORT = 0.34, BEVEL = 0.05, SMOOTH = 4;
        const DARK = 0x1F4F0D, LIGHT = 0x409C1C, TEXT = '#0F2905', BG = 0xffffff;
        const LETTERS = {'1,4':'H','1,5':'D','1,6':'P','1,7':'E','2,6':'P','5,0':'P','5,1':'A','6,1':'I','7,1':'M','7,2':'B','7,3':'S'};
        const toneOf = (r,c) => { const top = r<4, left = c<4; return ((top&&left)||(!top&&!left)) ? 'dark' : 'light'; };
        const hash = (r,c) => { const n = Math.sin(r*12.9898 + c*78.233) * 43758.5453; return n - Math.floor(n); };
        const clamp01 = x => x<0?0:x>1?1:x, easeOutCubic = x => 1-Math.pow(1-x,3), lerp = (a,b,t) => a+(b-a)*t;
        const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio||1, 2));
        renderer.setSize(stage.clientWidth, stage.clientHeight);
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        stage.insertBefore(renderer.domElement, stage.firstChild);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(BG);
        const camera = new THREE.PerspectiveCamera(30, stage.clientWidth/stage.clientHeight, 0.1, 100);
        const fitCamera = () => {
          const a = stage.clientWidth/Math.max(1, stage.clientHeight);
          const k = a<1 ? Math.min(1.8, 1/a) : 1;
          camera.position.set(6*k, 9*k, 14*k); camera.aspect = a; camera.lookAt(0, 0.4, 0); camera.updateProjectionMatrix();
        };
        fitCamera();

        const pmrem = new THREE.PMREMGenerator(renderer);
        const buildEnv = (bg, formers) => {
          const es = new THREE.Scene(); es.background = new THREE.Color(bg);
          for (const f of formers) {
            let geo;
            if (f.form === 'circle') geo = new THREE.CircleGeometry(1, 48);
            else if (f.form === 'ring') geo = new THREE.RingGeometry(0.5, 1, 48);
            else geo = new THREE.PlaneGeometry(1, 1);
            const col = new THREE.Color(f.color).multiplyScalar(f.intensity);
            const m = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: col, side: THREE.DoubleSide, toneMapped: false }));
            m.position.set(f.position[0], f.position[1], f.position[2]);
            if (f.rotation) m.rotation.set(f.rotation[0], f.rotation[1], f.rotation[2]);
            m.scale.set(f.scale[0], f.scale[1], f.scale[2] || 1);
            es.add(m);
          }
          const tex = pmrem.fromScene(es, 0.04).texture;
          es.traverse(o => { if (o.geometry) o.geometry.dispose(); if (o.material) o.material.dispose(); });
          return tex;
        };
        const greenEnv = buildEnv('#f3f5f2', [
          { form:'rect', intensity:1.4, position:[0,6,3],  rotation:[-Math.PI/2,0,0], scale:[10,5], color:'#ffffff' },
          { form:'rect', intensity:0.9, position:[-6,2,1], rotation:[0,Math.PI/2,0],  scale:[8,7],  color:'#ffffff' },
          { form:'rect', intensity:0.7, position:[6,2,2],  rotation:[0,-Math.PI/2,0], scale:[8,7],  color:'#eef3ee' },
          { form:'circle', intensity:0.4, position:[0,-2,4], scale:[6,6], color:'#dfeccb' },
        ]);
        const metalEnv = buildEnv('#1a1d22', [
          { form:'rect', intensity:1.4, position:[0,5,1],  rotation:[-Math.PI/2,0,0], scale:[12,12], color:'#ffffff' },
          { form:'rect', intensity:1.1, position:[-6,2,-3],rotation:[0,Math.PI/3,0],  scale:[9,9],   color:'#ff7a1a' },
          { form:'rect', intensity:0.6, position:[6,1,2],  rotation:[0,-Math.PI/2,0], scale:[7,7],   color:'#ffffff' },
          { form:'ring', intensity:0.9, position:[2,3,5],  scale:[3,3], color:'#ffd9b0' },
        ]);
        scene.environment = greenEnv;

        const greenLights = new THREE.Group();
        greenLights.add(new THREE.HemisphereLight(0xeef4f0, 0x23311a, 0.65));
        greenLights.add(new THREE.AmbientLight(0xffffff, 0.12));
        const gkey = new THREE.DirectionalLight(0xfff4e6, 1.05); gkey.position.set(6,9,6); greenLights.add(gkey);
        const gfill = new THREE.DirectionalLight(0xdce8ff, 0.32); gfill.position.set(-6,4,-3); greenLights.add(gfill);
        scene.add(greenLights);
        const metalLights = new THREE.Group(); metalLights.visible = false;
        metalLights.add(new THREE.AmbientLight(0xffffff, 0.25));
        const mkey = new THREE.DirectionalLight(0xeaf2ff, 1.0); mkey.position.set(6,9,5); metalLights.add(mkey);
        const mrim = new THREE.DirectionalLight(0xff7a1a, 2.2); mrim.position.set(-7,5,-7); metalLights.add(mrim);
        const mpoint = new THREE.PointLight(0xff8a2a, 7, 22); mpoint.position.set(-3,2.5,-5); metalLights.add(mpoint);
        scene.add(metalLights);

        const shc = document.createElement('canvas'); shc.width = shc.height = 256;
        const sx = shc.getContext('2d');
        const grad = sx.createRadialGradient(128,128,12,128,128,128);
        grad.addColorStop(0,'rgba(8,24,8,0.34)'); grad.addColorStop(1,'rgba(8,24,8,0)');
        sx.fillStyle = grad; sx.fillRect(0,0,256,256);
        const shadow = new THREE.Mesh(new THREE.PlaneGeometry(13,13), new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(shc), transparent: true, depthWrite: false }));
        shadow.rotation.x = -Math.PI/2; shadow.position.y = 0.002; scene.add(shadow);

        const textTex = (txt, w, h, px) => {
          const cv = document.createElement('canvas'); cv.width = w; cv.height = h;
          const x = cv.getContext('2d'); x.clearRect(0,0,w,h);
          x.fillStyle = TEXT; x.font = 'bold '+px+'px Helvetica, Arial, sans-serif';
          x.textAlign = 'center'; x.textBaseline = 'middle';
          if (txt.length === 1) x.fillText(txt, w/2, h/2+4);
          else { const step = px; const start = w/2 - (txt.length*step)/2 + step/2; txt.split('').forEach((ch,i)=>x.fillText(ch, start+i*step, h/2+4)); }
          const t = new THREE.CanvasTexture(cv); t.anisotropy = 4; t.colorSpace = THREE.SRGBColorSpace; return t;
        };

        const tallGeo = new RoundedBoxGeometry(CS, H_TALL, CS, SMOOTH, BEVEL);
        const shortGeo = new RoundedBoxGeometry(CS, H_SHORT, CS, SMOOTH, BEVEL);
        const root = new THREE.Group(); scene.add(root);
        const mid = (GRID-1)/2, cells = [];
        const matParams = (v, tn) => v === 'metallic'
          ? { color: tn==='dark'?0x8b9197:0xd8dee2, metalness: 1, roughness: 0.34, clearcoat: 0.25, ccRough: 0.5, env: 1.1, emissive: 0xff8a3d, aniso: 0.6 }
          : { color: tn==='dark'?DARK:LIGHT, metalness: 0, roughness: 0.35, clearcoat: 0.55, ccRough: 0.25, env: 0.55, emissive: tn==='dark'?DARK:LIGHT, aniso: 0 };
        const jit = (base, r, c) => Math.max(0.08, base + (hash(r,c) - 0.5) * 0.12);
        let variant = 'glossy-green';
        for (let r=0;r<GRID;r++) for (let c=0;c<GRID;c++) {
          const tn = toneOf(r,c), h = tn==='dark'?H_TALL:H_SHORT, x = (c-mid)*PITCH, z = (r-mid)*PITCH;
          const g = new THREE.Group(); g.position.set(x, 0, z); g.scale.y = reduce?1:0.0001;
          const p = matParams(variant, tn);
          const mat = new THREE.MeshPhysicalMaterial({ color: p.color, metalness: p.metalness, roughness: p.roughness, clearcoat: p.clearcoat, clearcoatRoughness: p.ccRough, envMapIntensity: p.env, emissive: p.emissive, emissiveIntensity: 0 });
          mat.anisotropy = p.aniso; mat.roughness = jit(p.roughness, r, c);
          const mesh = new THREE.Mesh(tn==='dark'?tallGeo:shortGeo, mat); mesh.position.y = h/2; g.add(mesh);
          const lk = r+','+c;
          if (LETTERS[lk]) {
            const lp = new THREE.Mesh(new THREE.PlaneGeometry(0.66, 0.66), new THREE.MeshBasicMaterial({ map: textTex(LETTERS[lk],256,256,172), transparent: true, depthWrite: false }));
            lp.rotation.x = -Math.PI/2; lp.position.y = h+0.012; g.add(lp);
          }
          root.add(g);
          cells.push({ group: g, mat, tone: tn, r, c, x, z, diag: (r+c)/(2*(GRID-1)) });
        }
        const word = new THREE.Group(); word.position.set(0, 0.02, mid*PITCH + 0.95);
        const wm = new THREE.Mesh(new THREE.PlaneGeometry(3.4, 0.85), new THREE.MeshBasicMaterial({ map: textTex('EMLTA',1024,256,132), transparent: true, depthWrite: false }));
        wm.rotation.x = -Math.PI/2; word.add(wm); word.scale.setScalar(reduce?1:0.0001); root.add(word);

        const applyVariant = (v) => {
          variant = v;
          scene.environment = v === 'metallic' ? metalEnv : greenEnv;
          greenLights.visible = v !== 'metallic'; metalLights.visible = v === 'metallic';
          for (const c of cells) { const p = matParams(v, c.tone);
            c.mat.color.set(p.color); c.mat.metalness = p.metalness; c.mat.clearcoat = p.clearcoat;
            c.mat.clearcoatRoughness = p.ccRough; c.mat.envMapIntensity = p.env; c.mat.emissive.set(p.emissive);
            c.mat.anisotropy = p.aniso; c.mat.roughness = jit(p.roughness, c.r, c.c); c.mat.needsUpdate = true; }
          const bg = document.getElementById('b-gloss'); if (bg) bg.classList.toggle('on', v === 'glossy-green');
          const bm = document.getElementById('b-metal'); if (bm) bm.classList.toggle('on', v === 'metallic');
        };
        const bgloss = document.getElementById('b-gloss'); if (bgloss) bgloss.onclick = () => applyVariant('glossy-green');
        const bmetal = document.getElementById('b-metal'); if (bmetal) bmetal.onclick = () => applyVariant('metallic');

        const pointer = { x: 0, z: 0, active: false };
        const ray = new THREE.Raycaster(), ndc = new THREE.Vector2(), plane = new THREE.Plane(new THREE.Vector3(0,1,0), 0), hit = new THREE.Vector3();
        if (!reduce) {
          renderer.domElement.addEventListener('pointermove', (e) => {
            const b = renderer.domElement.getBoundingClientRect();
            ndc.x = ((e.clientX-b.left)/b.width)*2-1; ndc.y = -((e.clientY-b.top)/b.height)*2+1;
            ray.setFromCamera(ndc, camera);
            if (ray.ray.intersectPlane(plane, hit)) { const loc = root.worldToLocal(hit.clone()); pointer.x = loc.x; pointer.z = loc.z; pointer.active = true; }
          });
          renderer.domElement.addEventListener('pointerleave', () => pointer.active = false);
        }

        new ResizeObserver(() => { renderer.setSize(stage.clientWidth, stage.clientHeight); fitCamera(); }).observe(stage);

        const clock = new THREE.Clock(); let start = null;
        const tick = () => {
          requestAnimationFrame(tick);
          const t = clock.getElapsedTime(); if (start === null) start = t; const since = t - start;
          if (!reduce) { root.position.y = Math.sin(t*0.9)*0.06; root.rotation.y = Math.sin(t*0.32)*(8*Math.PI/180); }
          for (const c of cells) {
            let bp = 1;
            if (!reduce) { const delay = 0.15 + c.diag*0.6; bp = easeOutCubic(clamp01((since-delay)/0.55)); }
            c.group.scale.y = Math.max(0.0001, bp);
            let lift = 0, bright = 0;
            if (!reduce && pointer.active) { const dx = c.x-pointer.x, dz = c.z-pointer.z, d = Math.hypot(dx,dz), f = Math.max(0,1-d/1.9), ff = f*f; lift = ff*0.28; bright = ff*0.55; }
            c.group.position.y = lerp(c.group.position.y, lift, 0.16);
            c.mat.emissiveIntensity = lerp(c.mat.emissiveIntensity, bright, 0.16);
          }
          if (!reduce) { const wp = easeOutCubic(clamp01((since-0.85)/0.5)); word.scale.setScalar(Math.max(0.0001, wp)); }
          renderer.render(scene, camera);
        };
        tick();
      } catch (e) { showErr(e); }
    </script>
  </body>
</html>
